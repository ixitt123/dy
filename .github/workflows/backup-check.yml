name: check-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    name: check-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run protected release gate
        run: pnpm run check:gate

      - name: Ensure checks leave a clean tree
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$(git status --short)" ]; then
            git status --short
            echo "Checks generated uncommitted files."
            exit 1
          fi
