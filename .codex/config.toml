[features]
hooks = true

[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = "node .codex/hooks/session-start-sync.mjs"
command_windows = "node .codex\\hooks\\session-start-sync.mjs"
timeout = 180
statusMessage = "正在同步 GitHub 最新版本"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "node .codex/hooks/stop-sync.mjs"
command_windows = "node .codex\\hooks\\stop-sync.mjs"
timeout = 180
statusMessage = "正在上传本轮 Codex 修改"
