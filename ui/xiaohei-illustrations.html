<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小黑配图软件</title>
  <link rel="stylesheet" href="./xiaohei-illustrations.css" />
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Ian Xiaohei Illustration</p>
          <h1>小黑配图软件</h1>
        </div>
        <div class="topbar-actions">
          <button id="openOutputDir" type="button">打开输出目录</button>
          <button id="refreshOutputs" type="button">刷新记录</button>
        </div>
      </header>

      <section class="composer">
        <section class="provider-setup">
          <div>
            <strong>MiniMax（稀宇）TTS</strong>
            <span id="minimaxStatus">正在检查配置</span>
          </div>
          <label class="field">
            <span>API Key</span>
            <input id="minimaxApiKey" type="password" autocomplete="off" placeholder="已配置时留空不会修改" />
          </label>
          <label class="field">
            <span>模型</span>
            <select id="minimaxModel">
              <option value="speech-2.6-hd">speech-2.6-hd（支持情感，默认）</option>
              <option value="speech-2.8-hd">speech-2.8-hd（超自然音质）</option>
            </select>
          </label>
          <div class="settings-actions">
            <button id="saveMinimaxSettings" type="button">保存 MiniMax 配置</button>
            <button id="testMinimaxSettings" type="button">测试连接</button>
            <button id="deleteMinimaxApi" type="button" class="danger">删除 API</button>
          </div>
          <div id="integrationStatus" class="integration-status">正在读取图片 Provider、剪映目录和输出目录状态。</div>
        </section>
        <label class="field field-title">
          <span>配图标题</span>
          <input id="titleInput" type="text" placeholder="可选；不填则自动提取文案第一句" />
        </label>
        <label class="field field-text">
          <span>输入文案</span>
          <textarea id="copyInput" placeholder="把文章段落、短文案或方法论说明粘贴到这里。"></textarea>
        </label>
        <div class="control-grid">
          <label class="field">
            <span>配音音色</span>
            <select id="voiceSelect"></select>
          </label>
          <label class="field">
            <span>情感</span>
            <select id="emotionSelect"></select>
          </label>
          <label class="field">
            <span>语速</span>
            <select id="speedSelect"></select>
          </label>
          <label class="field">
            <span>视频比例</span>
            <select id="aspectRatioSelect"></select>
          </label>
          <label class="field">
            <span>图片用途</span>
            <select id="purposeSelect">
            </select>
          </label>
        </div>
        <div class="voice-actions">
          <button id="previewVoice" type="button">试听当前音色</button>
          <button id="setDefaultVoice" type="button">设为默认</button>
          <button id="deleteVoice" type="button" class="danger">永久删除音色</button>
          <span id="voiceDescription">选择音色后可以先试听。</span>
        </div>
        <details class="advanced-panel">
          <summary>备用音频与克隆音色</summary>
          <div class="advanced-grid">
            <label class="field">
              <span>上传已有 TTS（备用）</span>
              <input id="localAudioInput" type="file" accept=".mp3,.wav,.m4a,audio/mpeg,audio/wav,audio/mp4" />
              <small>上传后会先识别并核对文案；不一致时停止生成。</small>
            </label>
            <label class="field">
              <span>克隆音色名称</span>
              <input id="cloneVoiceName" type="text" placeholder="例如：我的口播音色" />
            </label>
            <label class="field">
              <span>本人授权参考音频</span>
              <input id="cloneAudioInput" type="file" accept=".mp3,.wav,.m4a,audio/mpeg,audio/wav,audio/mp4" />
              <small>MiniMax 建议至少 10 秒清晰单人声，无音乐和混响。</small>
            </label>
            <label class="field">
              <span>参考音频文字</span>
              <input id="cloneTranscript" type="text" placeholder="填写参考音频中说的原文" />
            </label>
          </div>
          <label class="consent-row">
            <input id="cloneConsent" type="checkbox" />
            <span>我确认拥有该声音的合法使用授权</span>
          </label>
          <button id="cloneVoice" type="button">创建并保存克隆音色</button>
        </details>
        <section class="audio-studio">
          <div class="panel-head">
            <div>
              <h2>本视频配音</h2>
              <p>先单独生成和试听，确认后才会开始分镜与配图。</p>
            </div>
            <div class="audio-actions">
              <button id="generateAudio" type="button" class="primary">生成一条音频</button>
              <button id="confirmAudio" type="button">确定本视频使用</button>
            </div>
          </div>
          <div id="audioPreviewPanel" class="audio-preview" hidden>
            <strong id="audioPreviewTitle">当前试听音频</strong>
            <audio id="audioPreview" controls></audio>
          </div>
          <div id="audioJobs" class="audio-job-list empty">当前项目还没有音频。</div>
        </section>
        <div class="actions">
          <button id="planPrompts" type="button">根据音频分析分镜配图</button>
          <button id="copyPrompts" type="button">复制全部提示词</button>
          <button id="generateImages" type="button" class="primary">一键生成剪映草稿</button>
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <div>
          <span id="statusLabel">待输入</span>
          <p id="statusDetail">先生成并确认音频，再按音频时间轴分析分镜；逐段上传确认图片后，一键生成剪映草稿。</p>
        </div>
        <div class="progress-box">
          <div class="progress-meta">
            <span id="progressStep">等待开始</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-shell"><div id="progressBar"></div></div>
        </div>
      </section>

      <section class="results-grid">
        <div class="panel">
          <div class="panel-head">
            <h2>提示词计划</h2>
            <span id="planCount">0</span>
          </div>
          <div id="promptResults" class="prompt-list empty">还没有生成提示词。</div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <h2>生成结果</h2>
            <span id="imageCount">0</span>
          </div>
          <div id="imageResults" class="image-list empty">生成后的图片会显示在这里。</div>
        </div>
      </section>

      <section class="panel output-panel">
        <div class="panel-head">
          <h2>历史输出</h2>
          <span id="outputDirLabel"></span>
        </div>
        <details id="outputHistoryPanel" class="history-panel">
          <summary>展开历史输出 <span id="outputHistoryCount">0</span></summary>
          <div id="outputHistory" class="history-list empty">暂无历史输出。</div>
        </details>
      </section>
    </section>
  </main>
  <script type="module" src="./modules/ian-xiaohei-app.js"></script>
</body>
</html>
