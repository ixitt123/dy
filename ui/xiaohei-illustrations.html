<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小黑配图软件</title>
  <link rel="stylesheet" href="./xiaohei-illustrations.css" />
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Ian Xiaohei Illustration</p>
          <h1>小黑配图软件</h1>
        </div>
        <div class="topbar-actions">
          <button id="openOutputDir" type="button">打开输出目录</button>
          <button id="refreshOutputs" type="button">刷新记录</button>
        </div>
      </header>

      <section class="composer">
        <label class="field field-title">
          <span>配图标题</span>
          <input id="titleInput" type="text" placeholder="可选；不填则自动提取文案第一句" />
        </label>
        <label class="field field-text">
          <span>输入文案</span>
          <textarea id="copyInput" placeholder="把文章段落、短文案或方法论说明粘贴到这里。"></textarea>
        </label>
        <div class="control-grid">
          <label class="field">
            <span>配音音色</span>
            <select id="voiceSelect"></select>
          </label>
          <label class="field">
            <span>语速</span>
            <select id="speedSelect">
              <option value="0.9">稍慢</option>
              <option value="1" selected>自然</option>
              <option value="1.1">稍快</option>
              <option value="1.2">短视频快节奏</option>
            </select>
          </label>
          <label class="field">
            <span>图片用途</span>
            <select id="purposeSelect">
            </select>
          </label>
        </div>
        <details class="advanced-panel">
          <summary>备用音频与克隆音色</summary>
          <div class="advanced-grid">
            <label class="field">
              <span>上传已有 TTS（备用）</span>
              <input id="localAudioInput" type="file" accept=".mp3,.wav,.m4a,audio/mpeg,audio/wav,audio/mp4" />
              <small>上传后会先识别并核对文案；不一致时停止生成。</small>
            </label>
            <label class="field">
              <span>克隆音色名称</span>
              <input id="cloneVoiceName" type="text" placeholder="例如：我的口播音色" />
            </label>
            <label class="field">
              <span>本人授权参考音频</span>
              <input id="cloneAudioInput" type="file" accept=".mp3,.wav,.m4a,audio/mpeg,audio/wav,audio/mp4" />
              <small>建议 10–20 秒清晰单人声，无音乐和混响。</small>
            </label>
            <label class="field">
              <span>参考音频文字</span>
              <input id="cloneTranscript" type="text" placeholder="填写参考音频中说的原文" />
            </label>
          </div>
          <label class="consent-row">
            <input id="cloneConsent" type="checkbox" />
            <span>我确认拥有该声音的合法使用授权</span>
          </label>
          <button id="cloneVoice" type="button">创建并保存克隆音色</button>
        </details>
        <div class="actions">
          <button id="generateImages" type="button" class="primary">一键生成完整素材并导入剪映</button>
          <button id="planPrompts" type="button">仅分析文案配图</button>
          <button id="copyPrompts" type="button">复制全部提示词</button>
        </div>
        <div id="audioPreviewPanel" class="audio-preview" hidden>
          <strong>当前 TTS 音频</strong>
          <audio id="audioPreview" controls></audio>
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <div>
          <span id="statusLabel">待输入</span>
          <p id="statusDetail">输入文案后，系统会自动配音、按音频节奏分镜、逐段配图并导入剪映。</p>
        </div>
        <div class="progress-box">
          <div class="progress-meta">
            <span id="progressStep">等待开始</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-shell"><div id="progressBar"></div></div>
        </div>
      </section>

      <section class="results-grid">
        <div class="panel">
          <div class="panel-head">
            <h2>提示词计划</h2>
            <span id="planCount">0</span>
          </div>
          <div id="promptResults" class="prompt-list empty">还没有生成提示词。</div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <h2>生成结果</h2>
            <span id="imageCount">0</span>
          </div>
          <div id="imageResults" class="image-list empty">生成后的图片会显示在这里。</div>
        </div>
      </section>

      <section class="panel output-panel">
        <div class="panel-head">
          <h2>历史输出</h2>
          <span id="outputDirLabel"></span>
        </div>
        <div id="outputHistory" class="history-list empty">暂无历史输出。</div>
      </section>
    </section>
  </main>
  <script type="module" src="./modules/ian-xiaohei-app.js"></script>
</body>
</html>
